<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд заказов Nova</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 2.5rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .stat-card h3 { color: #666; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-card .value { font-size: 2.5rem; font-weight: bold; color: #333; }
    .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .chart-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .chart-card h2 { color: #333; margin-bottom: 20px; }
    .orders-table { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; }
    tr:hover { background: #f8f9fa; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }
    .badge-new { background: #e3f2fd; color: #1976d2; }
    .badge-processing { background: #fff3e0; color: #f57c00; }
    .loading { text-align: center; padding: 40px; color: white; font-size: 1.2rem; }
    @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Дашборд заказов Nova</h1>
    
    <div class="stats" id="stats">
      <div class="stat-card"><h3>Всего заказов</h3><div class="value" id="total-orders">-</div></div>
      <div class="stat-card"><h3>Общая сумма</h3><div class="value" id="total-amount">-</div></div>
      <div class="stat-card"><h3>Средний чек</h3><div class="value" id="avg-order">-</div></div>
      <div class="stat-card"><h3>Городов</h3><div class="value" id="cities">-</div></div>
    </div>
    
    <div class="charts">
      <div class="chart-card"><h2>📈 Продажи по городам</h2><canvas id="cityChart"></canvas></div>
      <div class="chart-card"><h2>🍩 Источники трафика (UTM)</h2><canvas id="utmChart"></canvas></div>
    </div>
    
    <div class="orders-table">
      <h2>📋 Последние заказы</h2>
      <table>
        <thead><tr><th>ID</th><th>Клиент</th><th>Телефон</th><th>Город</th><th>Сумма</th><th>Статус</th></tr></thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.supabase = window.supabase.createClient(
      'https://tklwycaigvphpzzfxwjf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbHd5Y2FpZ3ZwaHB6emZ4d2pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDE3OTIsImV4cCI6MjA5MTU3Nzc5Mn0.UmDYta9OFK6p0jsJHW5aViDetwwMnQ1BImYcnBGxSw0'
    );

    async function loadDashboard() {
      document.getElementById('stats').innerHTML += '<div class="loading">Загрузка данных...</div>';
      
      const { data: orders, error } = await window.supabase
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('stats').innerHTML = '<div class="loading">Ошибка загрузки: ' + error.message + '</div>';
        return;
      }

      const totalOrders = orders.length;
      const totalAmount = orders.reduce((sum, o) => sum + (parseFloat(o.total_price) || 0), 0);
      const avgOrder = totalOrders > 0 ? Math.round(totalAmount / totalOrders) : 0;
      const cities = [...new Set(orders.map(o => o.city))].filter(Boolean);

      document.getElementById('total-orders').textContent = totalOrders;
      document.getElementById('total-amount').textContent = totalAmount.toLocaleString('ru-RU') + ' ₸';
      document.getElementById('avg-order').textContent = avgOrder.toLocaleString('ru-RU') + ' ₸';
      document.getElementById('cities').textContent = cities.length;

      const cityData = {};
      orders.forEach(order => {
        const city = order.city || 'Не указан';
        cityData[city] = (cityData[city] || 0) + 1;
      });

      const utmData = {};
      orders.forEach(order => {
        const utm = order.utm_source || 'direct';
        utmData[utm] = (utmData[utm] || 0) + 1;
      });

      new Chart(document.getElementById('cityChart'), {
        type: 'bar',
        data: {
          labels: Object.keys(cityData),
          datasets: [{ label: 'Заказов', data: Object.values(cityData), backgroundColor: '#667eea' }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      new Chart(document.getElementById('utmChart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(utmData),
          datasets: [{ data: Object.values(utmData), backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe'] }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
      });

      const tbody = document.getElementById('orders-tbody');
      orders.slice(0, 20).forEach(order => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>#${order.external_id || order.id}</td>
          <td>${order.first_name || ''} ${order.last_name || ''}</td>
          <td>${order.phone || '-'}</td>
          <td>${order.city || '-'}</td>
          <td>${(parseFloat(order.total_price) || 0).toLocaleString('ru-RU')} ₸</td>
          <td><span class="badge badge-${order.status || 'new'}">${order.status || 'new'}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadDashboard();
  </script>
</body>
</html>
